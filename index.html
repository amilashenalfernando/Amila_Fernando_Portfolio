  <script>
    // Critical blocking script to prevent theme flash
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || !saved) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.add('light');
      }
    })();
  </script>
